<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>三合一 · 人格职业测试</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #f0f4ff 0%, #e6eefa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            margin: 0;
        }
        .app-container {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 20, 40, 0.25), inset 0 1px 2px rgba(255,255,255,0.6);
            padding: 1.8rem 1.5rem;
            border: 1px solid rgba(255,255,255,0.6);
            transition: all 0.2s ease;
        }
        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1e2b5e, #2d3a7c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        h1 span {
            font-size: 2rem;
            background: none;
            -webkit-text-fill-color: initial;
            color: #2d3a7c;
        }
        .subhead {
            color: #4a5b8c;
            font-weight: 450;
            margin-bottom: 2rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px dashed rgba(73, 93, 143, 0.2);
        }
        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin: 1.5rem 0 0.5rem;
        }
        .test-card {
            background: white;
            border-radius: 1.8rem;
            padding: 1.5rem 1.5rem;
            box-shadow: 0 6px 14px rgba(45, 58, 124, 0.08);
            border: 1px solid rgba(255,255,255,0.8);
            transition: transform 0.1s, box-shadow 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 1rem;
            backdrop-filter: blur(4px);
        }
        .test-card:hover {
            transform: scale(1.02);
            box-shadow: 0 18px 30px -8px rgba(30, 43, 94, 0.2);
            background: #ffffffec;
        }
        .card-icon {
            font-size: 2.6rem;
            background: #eef3ff;
            width: 4rem;
            height: 4rem;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e2b5e;
        }
        .card-content h3 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #141f44;
            margin-bottom: 0.2rem;
        }
        .card-content p {
            color: #5b6b99;
            font-size: 0.95rem;
        }
        .test-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.8rem;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #384875;
            padding: 0.3rem 0.8rem 0.3rem 0.3rem;
            border-radius: 3rem;
            display: flex;
            align-items: center;
            gap: 0.2rem;
            font-weight: 500;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(4px);
        }
        .back-btn:hover {
            background: white;
        }
        .progress {
            background: #d6e0f0;
            height: 8px;
            border-radius: 20px;
            width: 100%;
            margin: 0.5rem 0 1.8rem;
        }
        .progress-fill {
            height: 8px;
            background: #2d3a7c;
            border-radius: 20px;
            width: 0%;
            transition: width 0.2s;
        }
        .question-text {
            font-size: 1.6rem;
            font-weight: 550;
            line-height: 1.4;
            color: #0b163a;
            margin: 0.5rem 0 1.8rem;
            min-height: 4rem;
        }
        .options-area {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 1.5rem 0 2rem;
        }
        .option-btn {
            background: white;
            border: 2px solid #ced8ec;
            border-radius: 3rem;
            padding: 1rem 1.5rem;
            font-size: 1.2rem;
            font-weight: 500;
            color: #1e2b5e;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            transition: all 0.15s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            cursor: pointer;
        }
        .option-btn:hover {
            background: #e9efff;
            border-color: #6c7fb0;
        }
        .option-btn.selected {
            background: #1e2b5e;
            border-color: #1e2b5e;
            color: white;
            box-shadow: 0 12px 20px -14px #0b163a;
        }
        .option-btn.selected span {
            color: white;
        }
        .option-btn span {
            font-size: 1.6rem;
        }
        .number-panel {
            display: flex;
            justify-content: space-between;
            gap: 0.5rem;
            margin: 1.2rem 0;
        }
        .num-btn {
            flex: 1;
            background: white;
            border: 2px solid #ced8ec;
            border-radius: 2rem;
            padding: 0.9rem 0;
            font-size: 1.4rem;
            font-weight: 600;
            color: #1e2b5e;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s;
        }
        .num-btn.selected {
            background: #1e2b5e;
            border-color: #1e2b5e;
            color: white;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 1.8rem;
        }
        .nav-btn {
            background: rgba(255,255,255,0.8);
            border: 1px solid #b3c2df;
            padding: 0.8rem 1.8rem;
            border-radius: 3rem;
            font-weight: 500;
            color: #1d2b58;
            backdrop-filter: blur(8px);
            cursor: pointer;
            font-size: 1rem;
        }
        .nav-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        .result-box {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 2rem 1.5rem;
            margin: 1rem 0 2rem;
            border: 1px solid white;
        }
        .result-title {
            font-size: 2rem;
            font-weight: 700;
            color: #0b163a;
            margin-bottom: 0.75rem;
        }
        .result-sub {
            font-size: 1.2rem;
            color: #37487a;
            margin-bottom: 1.5rem;
            border-left: 4px solid #5565a0;
            padding-left: 1rem;
        }
        .result-detail {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            color: #18224b;
            line-height: 1.6;
            font-size: 1.1rem;
        }
        .restart-row {
            display: flex;
            gap: 0.8rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }
        .button-primary {
            background: #1e2b5e;
            border: none;
            padding: 0.9rem 1.8rem;
            border-radius: 3rem;
            font-weight: 600;
            color: white;
            font-size: 1.1rem;
            flex: 1;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 10px 18px -8px #1e2b5e70;
        }
        .button-secondary {
            background: rgba(255,255,255,0.9);
            border: 1px solid #b3c2df;
            padding: 0.9rem 1.8rem;
            border-radius: 3rem;
            font-weight: 500;
            color: #1e2b5e;
            flex: 1;
            cursor: pointer;
            text-align: center;
        }
        .footer {
            margin-top: 2rem;
            color: #7789b9;
            font-size: 0.8rem;
            text-align: center;
        }
        .no-click {
            pointer-events: none;
            opacity: 0.5;
        }
        .hide {
            display: none;
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <!-- 动态内容由 JavaScript 渲染 -->
    <div id="contentRoot"></div>
    <div class="footer" id="footer">⚡ 综合人格·职业·性格探索</div>
</div>

<script>
    (function() {
        // ----- 测试数据结构 -----
        const tests = {
            mbti: {
                id: 'mbti',
                name: 'MBTI 简化测试',
                icon: '🧠',
                desc: '8题 · 四个维度倾向',
                questions: [
                    { text: '结束一天工作后，你更倾向于？', optA: '跟朋友聚会聊天', optB: '自己安静呆着', scoreA: {E:1}, scoreB: {I:1} },
                    { text: '哪种情况让你更有能量？', optA: '与人互动交流', optB: '独处思考', scoreA: {E:1}, scoreB: {I:1} },
                    { text: '你更关注？', optA: '眼前具体的事实', optB: '未来的可能性', scoreA: {S:1}, scoreB: {N:1} },
                    { text: '阅读偏好？', optA: '纪实、操作手册', optB: '奇幻、科幻小说', scoreA: {S:1}, scoreB: {N:1} },
                    { text: '做决定主要依靠？', optA: '客观逻辑', optB: '个人感受/价值观', scoreA: {T:1}, scoreB: {F:1} },
                    { text: '更希望被称赞？', optA: '思维清晰', optB: '善解人意', scoreA: {T:1}, scoreB: {F:1} },
                    { text: '生活方式？', optA: '计划有序', optB: '灵活随性', scoreA: {J:1}, scoreB: {P:1} },
                    { text: '对待截止日期？', optA: '提前完成', optB: '最后冲刺', scoreA: {J:1}, scoreB: {P:1} }
                ],
                // 结果计算
                getResult: (answers) => {
                    const scores = {E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0};
                    answers.forEach((ansIdx, qIdx) => {
                        if (ansIdx === null || ansIdx === undefined) return;
                        const q = tests.mbti.questions[qIdx];
                        if (ansIdx === 0 && q.scoreA) Object.assign(scores, { [Object.keys(q.scoreA)[0]]: scores[Object.keys(q.scoreA)[0]] + 1 });
                        else if (ansIdx === 1 && q.scoreB) Object.assign(scores, { [Object.keys(q.scoreB)[0]]: scores[Object.keys(q.scoreB)[0]] + 1 });
                    });
                    const e = scores.E >= scores.I ? 'E' : 'I';
                    const s = scores.S >= scores.N ? 'S' : 'N';
                    const t = scores.T >= scores.F ? 'T' : 'F';
                    const j = scores.J >= scores.P ? 'J' : 'P';
                    const type = e + s + t + j;
                    const descriptions = {
                        ISTJ: '严谨务实，责任心强，适合管理、会计、法律等职业。',
                        ISFJ: '温暖体贴，善于支持，适合护理、教育、行政。',
                        INFJ: '洞察力强，理想主义，适合心理咨询、写作、研究。',
                        INTJ: '战略思维，独立自主，适合科学、策划、技术架构。',
                        ISTP: '冷静分析，擅长操作，适合工程、机械、法医。',
                        ISFP: '柔和敏感，追求美感，适合艺术、设计、自然相关。',
                        INFP: '理想主义者，关注意义，适合创作、咨询、非营利。',
                        INTP: '热爱逻辑，求知欲强，适合科研、哲学、编程。',
                        ESTP: '精力充沛，随机应变，适合销售、创业、体育。',
                        ESFP: '热情外向，享受当下，适合演艺、公关、旅游。',
                        ENFP: '充满创意，善于激励，适合营销、传媒、策划。',
                        ENTP: '聪颖好奇，喜欢辩论，适合创业、法律、产品。',
                        ESTJ: '高效务实，善于管理，适合行政、军警、项目管理。',
                        ESFJ: '热心助人，责任感强，适合教育、医疗、人力资源。',
                        ENFJ: '富有魅力，善于沟通，适合领导、咨询、政治。',
                        ENTJ: '果断自信，擅长战略，适合高管、创业、法律。'
                    };
                    const desc = descriptions[type] || '你的类型组合独特，具有多方面的潜力。适合探索多元化职业。';
                    return { type, description: desc, scores };
                }
            },
            holland: {
                id: 'holland',
                name: '霍兰德职业人格',
                icon: '🔧',
                desc: '6题 · 发现职业代码',
                questions: [
                    { text: '你喜欢？', optA: '动手修理/组装', optB: '探索研究理论', scoreA: {R:1}, scoreB: {I:1} },
                    { text: '你更享受？', optA: '创意写作/艺术', optB: '整理归档/流程', scoreA: {A:1}, scoreB: {C:1} },
                    { text: '团队中你更偏向？', optA: '帮助/服务他人', optB: '领导/竞争', scoreA: {S:1}, scoreB: {E:1} },
                    { text: '哪种活动更有趣？', optA: '组织聚会/销售', optB: '独自钻研/实验', scoreA: {E:1}, scoreB: {I:1} },
                    { text: '处理任务时你注重？', optA: '精确/细节', optB: '创意/整体', scoreA: {C:1}, scoreB: {A:1} },
                    { text: '你更擅长？', optA: '说服/谈判', optB: '倾听/共情', scoreA: {E:1}, scoreB: {S:1} }
                ],
                getResult: (answers) => {
                    const scores = {R:0, I:0, A:0, S:0, E:0, C:0};
                    answers.forEach((ansIdx, qIdx) => {
                        if (ansIdx === null) return;
                        const q = tests.holland.questions[qIdx];
                        if (ansIdx === 0 && q.scoreA) {
                            const key = Object.keys(q.scoreA)[0];
                            scores[key] += 1;
                        } else if (ansIdx === 1 && q.scoreB) {
                            const key = Object.keys(q.scoreB)[0];
                            scores[key] += 1;
                        }
                    });
                    // 排序取前三
                    const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
                    const code = sorted.map(s => s[0]).slice(0,3).join('');
                    const jobSuggest = {
                        R: '技术员、工程师、机械师',
                        I: '研究员、分析师、程序员',
                        A: '设计师、作家、音乐人',
                        S: '教师、心理咨询师、社工',
                        E: '销售经理、创业者、律师',
                        C: '会计、行政、数据分析师'
                    };
                    const top3 = sorted.slice(0,3).map(s => `${s[0]}：${jobSuggest[s[0]]}`).join('； ');
                    return { code, details: scores, suggestion: `首选类型: ${sorted[0][0]} — ${jobSuggest[sorted[0][0]]}。综合建议：${top3}` };
                }
            },
            bigfive: {
                id: 'bigfive',
                name: '简版大五性格',
                icon: '🌟',
                desc: '5题 · 五维度自评 (1~5)',
                questions: [
                    { text: '1. 我认为自己充满创造力', trait: '开放性' },
                    { text: '2. 我总是提前计划、有条理', trait: '尽责性' },
                    { text: '3. 我精力充沛，喜欢社交', trait: '外向性' },
                    { text: '4. 我同情他人的感受', trait: '宜人性' },
                    { text: '5. 我容易紧张或担忧', trait: '神经质' }
                ],
                getResult: (answers) => {
                    const traits = ['开放性', '尽责性', '外向性', '宜人性', '神经质'];
                    const levels = answers.map((val, idx) => {
                        let level = '';
                        if (val <= 2) level = '偏低';
                        else if (val === 3) level = '中等';
                        else level = '偏高';
                        return { trait: traits[idx], score: val, level };
                    });
                    const desc = levels.map(l => `${l.trait}：${l.score}分 (${l.level})`).join('； ');
                    return { levels, summary: desc };
                }
            }
        };

        // ----- 全局状态 -----
        let currentScreen = 'menu';          // 'menu' 或 'test'
        let currentTestId = null;             // 'mbti', 'holland', 'bigfive'
        let currentAnswers = [];               // 存储答案 (索引或数值)
        let currentIndex = 0;                  // 0-based

        // DOM 元素
        const root = document.getElementById('contentRoot');
        const footer = document.getElementById('footer');

        // 渲染函数
        function render() {
            if (currentScreen === 'menu') {
                renderMenu();
            } else if (currentScreen === 'test') {
                renderTest();
            }
        }

        function renderMenu() {
            root.innerHTML = `
                <h1><span>🧩</span> 三合一测试</h1>
                <div class="subhead">职业 · 人格 · 性格</div>
                <div class="menu-grid">
                    <div class="test-card" data-test="mbti">
                        <div class="card-icon">🧠</div>
                        <div class="card-content">
                            <h3>MBTI 简化测试</h3>
                            <p>8题 · 四个维度 · 16型人格</p>
                        </div>
                    </div>
                    <div class="test-card" data-test="holland">
                        <div class="card-icon">🔧</div>
                        <div class="card-content">
                            <h3>霍兰德职业人格</h3>
                            <p>6题 · 发现职业代码 (RIASEC)</p>
                        </div>
                    </div>
                    <div class="test-card" data-test="bigfive">
                        <div class="card-icon">🌟</div>
                        <div class="card-content">
                            <h3>简版大五性格</h3>
                            <p>5题 · 五维度自评 (1~5分)</p>
                        </div>
                    </div>
                </div>
            `;
            // 绑定卡片事件
            document.querySelectorAll('.test-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    const test = card.dataset.test;
                    startTest(test);
                });
            });
        }

        function startTest(testId) {
            currentScreen = 'test';
            currentTestId = testId;
            const test = tests[testId];
            currentAnswers = new Array(test.questions.length).fill(null);
            currentIndex = 0;
            render();
        }

        function renderTest() {
            const test = tests[currentTestId];
            if (!test) return;

            const q = test.questions[currentIndex];
            const isBigFive = currentTestId === 'bigfive';
            const progressPercent = ((currentIndex + 1) / test.questions.length) * 100;

            // 构建选项HTML
            let optionsHtml = '';
            if (isBigFive) {
                // 数字选项 1-5
                const selectedVal = currentAnswers[currentIndex];
                let btns = '';
                for (let i = 1; i <= 5; i++) {
                    const selectedClass = (selectedVal === i) ? 'selected' : '';
                    btns += `<div class="num-btn ${selectedClass}" data-value="${i}">${i}</div>`;
                }
                optionsHtml = `<div class="number-panel">${btns}</div>`;
            } else {
                // 二选一
                const selected = currentAnswers[currentIndex];
                optionsHtml = `
                    <div class="option-btn ${selected === 0 ? 'selected' : ''}" data-opt="0"><span>🅰️</span> ${q.optA}</div>
                    <div class="option-btn ${selected === 1 ? 'selected' : ''}" data-opt="1"><span>🅱️</span> ${q.optB}</div>
                `;
            }

            const headerIcon = test.icon || '📋';
            root.innerHTML = `
                <div class="test-header">
                    <button class="back-btn" id="backToMenuBtn"><span>←</span> 菜单</button>
                    <span style="font-size:1.8rem;">${headerIcon}</span>
                </div>
                <div style="font-weight:600; color:#384875;">${test.name} · 第 ${currentIndex+1}/${test.questions.length} 题</div>
                <div class="progress"><div class="progress-fill" style="width:${progressPercent}%;"></div></div>
                <div class="question-text">${q.text}</div>
                <div class="options-area" id="dynamicOptions">
                    ${optionsHtml}
                </div>
                <div class="nav-buttons">
                    <button class="nav-btn" id="prevBtn" ${currentIndex === 0 ? 'disabled' : ''}>← 上一题</button>
                    <button class="nav-btn" id="nextBtn" style="visibility:hidden;">占位</button>
                </div>
            `;

            // 绑定选项事件
            if (isBigFive) {
                document.querySelectorAll('.num-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const val = parseInt(btn.dataset.value, 10);
                        handleAnswer(val);
                    });
                });
            } else {
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const opt = parseInt(btn.dataset.opt, 10);
                        handleAnswer(opt);
                    });
                });
            }

            // 上一题
            document.getElementById('prevBtn').addEventListener('click', () => {
                if (currentIndex > 0) {
                    currentIndex--;
                    render();
                }
            });

            // 返回菜单
            document.getElementById('backToMenuBtn').addEventListener('click', () => {
                currentScreen = 'menu';
                render();
            });
        }

        function handleAnswer(value) {
            const test = tests[currentTestId];
            if (!test) return;

            // 保存答案
            currentAnswers[currentIndex] = value;

            // 如果是最后一题，直接进入结果
            if (currentIndex === test.questions.length - 1) {
                renderResult();
            } else {
                // 否则前进到下一题
                currentIndex++;
                render();
            }
        }

        function renderResult() {
            const test = tests[currentTestId];
            const result = test.getResult(currentAnswers);

            let resultContent = '';
            if (currentTestId === 'mbti') {
                resultContent = `
                    <div class="result-title">${result.type}</div>
                    <div class="result-sub">${result.description}</div>
                    <div class="result-detail">各维度倾向: E${result.scores.E}-I${result.scores.I} | S${result.scores.S}-N${result.scores.N} | T${result.scores.T}-F${result.scores.F} | J${result.scores.J}-P${result.scores.P}</div>
                `;
            } else if (currentTestId === 'holland') {
                resultContent = `
                    <div class="result-title">霍兰德代码: ${result.code}</div>
                    <div class="result-sub">${result.suggestion}</div>
                    <div class="result-detail">详细得分: R:${result.details.R} I:${result.details.I} A:${result.details.A} S:${result.details.S} E:${result.details.E} C:${result.details.C}</div>
                `;
            } else if (currentTestId === 'bigfive') {
                resultContent = `
                    <div class="result-title">大五轮廓</div>
                    <div class="result-sub">各维度得分 (1~5)</div>
                    <div class="result-detail">${result.summary}</div>
                `;
            }

            root.innerHTML = `
                <div class="test-header">
                    <button class="back-btn" id="backToMenuFromResult"><span>←</span> 菜单</button>
                    <span style="font-size:1.8rem;">${test.icon}</span>
                </div>
                <div class="result-box">
                    ${resultContent}
                </div>
                <div class="restart-row">
                    <button class="button-primary" id="restartTestBtn">🔄 重新测试</button>
                    <button class="button-secondary" id="chooseAnotherBtn">📋 选择其他测试</button>
                </div>
            `;

            document.getElementById('backToMenuFromResult').addEventListener('click', () => {
                currentScreen = 'menu';
                render();
            });
            document.getElementById('restartTestBtn').addEventListener('click', () => {
                // 重置当前测试
                currentAnswers = new Array(test.questions.length).fill(null);
                currentIndex = 0;
                render();
            });
            document.getElementById('chooseAnotherBtn').addEventListener('click', () => {
                currentScreen = 'menu';
                render();
            });
        }

        // 初始化菜单
        render();
    })();
</script>
</body>
</html>
